services:
  broadcaster-api:
    build: .
    container_name: broadcaster-api
    ports:
      - "3000:3000"
    environment:
      # Use the container name of the other service as the hostname
      - VLLM_URL=http://voxtral-tts:8000
    networks:
      - broadcaster-net

networks:
  broadcaster-net:
    external: true
